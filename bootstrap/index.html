<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Página</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="#">Mi Página</a>
    </div>
  </nav>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="container my-5">

    <!-- Título -->
    <div class="row text-center mb-5">
      <div class="col">
        <h1>Bienvenido</h1>
        <p class="text-muted">Página hecha con Bootstrap 5</p>
      </div>
    </div>

    <!-- Alerta dinámica (aparece con JS) -->
    <div id="zonaAlerta"></div>

    <!-- Cards -->
    <div class="row g-4 mb-5">

      <div class="col-md-4">
        <div class="card text-center p-3">
          <h5>HTML</h5>
          <p>Estructura de la página.</p>
          <button class="btn btn-primary" onclick="mostrarAlerta('Aprendiendo HTML 📄', 'info')">Ver más</button>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card text-center p-3">
          <h5>CSS</h5>
          <p>Estilos y diseño visual.</p>
          <button class="btn btn-primary" onclick="mostrarAlerta('Aprendiendo CSS 🎨', 'success')">Ver más</button>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card text-center p-3">
          <h5>JavaScript</h5>
          <p>Interactividad y lógica.</p>
          <button class="btn btn-primary" onclick="mostrarAlerta('Aprendiendo JavaScript ⚡', 'warning')">Ver más</button>
        </div>
      </div>

    </div>

    <!-- Formulario de login -->
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card p-4">
          <h4 class="mb-3 text-center">Iniciar sesión</h4>

          <div id="alertaLogin"></div>

          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com" />
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="clave" placeholder="Tu contraseña" />
          </div>

          <button class="btn btn-primary w-100" onclick="iniciarSesion()">Entrar</button>

          <p class="text-center text-muted mt-3 small">Demo: demo@correo.com / 123456</p>
        </div>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="bg-primary text-white text-center py-3 mt-5">
    <p class="mb-0">Actividad Bootstrap 5 — 2025</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
